    <rect x="184" y="268" width="38" height="128" rx="7" fill="#ffffff" opacity="0.35"/>
    <rect x="236" y="220" width="38" height="176" rx="7" fill="#ffffff" opacity="0.5"/>
    <rect x="288" y="172" width="38" height="224" rx="7" fill="#ffffff" opacity="0.7"/>
  </g>

