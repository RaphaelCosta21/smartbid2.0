  </defs>

  <!-- Document -->
  <g transform="rotate(-3, 240, 260)">
    <path d="M120 72h188l92 92v268c0 18-14.5 32.5-32.5 32.5H120c-18 0-32.5-14.5-32.5-32.5V104.5C87.5 86.5 102 72 120 72z" 
