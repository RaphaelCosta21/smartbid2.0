<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <!-- Dark icon for light backgrounds -->
  <defs>
    <linearGradient id="dkBg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f2b3d"/>
      <stop offset="100%" stop-color="#061420"/>
    </linearGradient>
    <linearGradient id="dkBarGrad" x1="0" y1="400" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#004d40"/>
      <stop offset="100%" stop-color="#00e6be"/>
    </linearGradient>
    <filter id="dkGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#00e6be" flood-opacity="0.5"/>
    </filter>
    <filter id="dkShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect x="24" y="24" width="464" height="464" rx="100" fill="url(#dkBg)" filter="url(#dkShadow)"/>

  <!-- Document - subtle outline style -->
  <g transform="rotate(-3, 240, 260)">
    <path d="M136 96h168l80 80v244c0 16-13 29-29 29H136c-16 0-29-13-29-29V125c0-16 13-29 29-29z" 
          fill="#00c9a7" opacity="0.06" stroke="#00c9a7" stroke-width="2.5" stroke-opacity="0.5"/>
    <path d="M304 96l80 80h-51c-16 0-29-13-29-29V96z" fill="#00c9a7" opacity="0.12"/>
  </g>

  <!-- Bars - teal glowing -->
  <g transform="rotate(-3, 240, 260)">
    <rect x="156" y="308" width="32" height="72" rx="6" fill="url(#dkBarGrad)" opacity="0.5"/>
    <rect x="200" y="272" width="32" height="108" rx="6" fill="url(#dkBarGrad)" opacity="0.6"/>
    <rect x="244" y="232" width="32" height="148" rx="6" fill="url(#dkBarGrad)" opacity="0.75"/>
    <rect x="288" y="192" width="32" height="188" rx="6" fill="url(#dkBarGrad)" opacity="0.9"/>
  </g>

  <!-- Checkmark - glowing teal -->
  <path d="M320 280l40 44 88-96" fill="none" stroke="#00e6be" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" filter="url(#dkGlow)"/>

  <!-- Diamond accent -->
  <rect x="396" y="92" width="24" height="24" rx="4" fill="#00e6be" opacity="0.5" transform="rotate(45, 408, 104)"/>
  
  <!-- Corner dots -->
  <circle cx="92" cy="432" r="5" fill="#00c9a7" opacity="0.3"/>
  <circle cx="110" cy="432" r="3" fill="#3b82f6" opacity="0.2"/>
</svg>
