<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00ddb3"/>
      <stop offset="45%" stop-color="#00b894"/>
      <stop offset="100%" stop-color="#005c4b"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0" y1="400" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#065f56"/>
      <stop offset="100%" stop-color="#00c9a7"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0" y1="400" x2="0" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#065f56"/>
      <stop offset="100%" stop-color="#00e6be"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#003d32" flood-opacity="0.35"/>
    </filter>
    <filter id="innerGlow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00e6be" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Main rounded square -->
  <rect x="24" y="24" width="464" height="464" rx="100" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Bid document - large, bold, slightly angled -->
  <g transform="rotate(-3, 240, 260)">
    <path d="M136 96h168l80 80v244c0 16-13 29-29 29H136c-16 0-29-13-29-29V125c0-16 13-29 29-29z" 
          fill="#ffffff" opacity="0.95"/>
    <!-- Fold -->
    <path d="M304 96l80 80h-51c-16 0-29-13-29-29V96z" fill="#c8f7ed"/>
    <!-- Fold line -->
    <path d="M304 96v51c0 16 13 29 29 29h51" fill="none" stroke="#0d9488" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Ascending bars inside document - representing smart bid analysis -->
  <g transform="rotate(-3, 240, 260)">
    <rect x="156" y="308" width="32" height="72" rx="6" fill="url(#barGrad1)" opacity="0.7"/>
    <rect x="200" y="272" width="32" height="108" rx="6" fill="url(#barGrad1)" opacity="0.8"/>
    <rect x="244" y="232" width="32" height="148" rx="6" fill="url(#barGrad2)" opacity="0.85"/>
    <rect x="288" y="192" width="32" height="188" rx="6" fill="url(#barGrad2)" opacity="0.95"/>
  </g>

  <!-- Bold angular checkmark - approval/smart decision -->
  <g filter="url(#innerGlow)">
    <path d="M320 280l40 44 88-96" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Small accent diamond - precision -->
  <rect x="396" y="92" width="24" height="24" rx="4" fill="#ffffff" opacity="0.5" transform="rotate(45, 408, 104)"/>
  
  <!-- Subtle corner accent dots -->
  <circle cx="92" cy="432" r="6" fill="#ffffff" opacity="0.25"/>
  <circle cx="112" cy="432" r="4" fill="#ffffff" opacity="0.15"/>
</svg>
