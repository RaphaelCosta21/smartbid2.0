<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200" fill="none">
  <!-- White horizontal logo for dark backgrounds -->
  <defs>
    <linearGradient id="wAccent" x1="0" y1="0" x2="280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e6be"/>
      <stop offset="100%" stop-color="#00c9a7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Mini icon (dark bg variant) -->
  <g transform="translate(24, 18) scale(0.32)">
    <rect x="24" y="24" width="464" height="464" rx="100" fill="#00c9a7" opacity="0.12" stroke="#00c9a7" stroke-width="3" stroke-opacity="0.4"/>
    
    <!-- Document -->
    <g transform="rotate(-3, 240, 260)">
      <path d="M136 96h168l80 80v244c0 16-13 29-29 29H136c-16 0-29-13-29-29V125c0-16 13-29 29-29z" fill="#ffffff" opacity="0.88"/>
      <path d="M304 96l80 80h-51c-16 0-29-13-29-29V96z" fill="#00c9a7" opacity="0.3"/>
    </g>

    <!-- Bars -->
    <g transform="rotate(-3, 240, 260)">
      <rect x="156" y="308" width="32" height="72" rx="6" fill="#00c9a7" opacity="0.5"/>
      <rect x="200" y="272" width="32" height="108" rx="6" fill="#00c9a7" opacity="0.6"/>
      <rect x="244" y="232" width="32" height="148" rx="6" fill="#00c9a7" opacity="0.7"/>
      <rect x="288" y="192" width="32" height="188" rx="6" fill="#00c9a7" opacity="0.85"/>
    </g>

    <!-- Checkmark -->
    <path d="M320 280l40 44 88-96" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- White wordmark -->
  <text x="200" y="104" font-family="'Segoe UI Light', 'Helvetica Neue', sans-serif" 
        font-size="60" font-weight="200" letter-spacing="1" fill="#e2e8f0">SMART</text>
  <text x="418" y="104" font-family="'Segoe UI Black', 'Helvetica Neue', sans-serif" 
        font-size="60" font-weight="900" letter-spacing="-1" fill="#ffffff">BID</text>
  
  <!-- Accent line -->
  <rect x="200" y="116" width="270" height="3" rx="1.5" fill="url(#wAccent)"/>
  
  <!-- Tagline -->
  <text x="202" y="152" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" 
        font-size="14" font-weight="500" letter-spacing="4" fill="#94a3b8">ENGINEERING BID SYSTEM</text>
</svg>
